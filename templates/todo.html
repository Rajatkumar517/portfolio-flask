<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do App</title>
    <link rel="stylesheet" href="{{url_for('static', filename='to-style.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        
    <h1>To Do App</h1> 

    <div class="scoreBox">
        <div class="scoreText">
            <p id="total">Total: 0</p>
            <p id="completed">Completed: 0</p>
            <p id="pending">Pending: 0</p>
        </div>
        <div class="taskration">0/0</div>
    </div>

    <div class="inputbox">
    <input type="text" id="addinput" size="40" placeholder="Write here">
    <button id="addtask">Add</button>
    </div>

    <ul id="tasklist"></ul>
    
    
    </div>

    <script src="{{url_for('static', filename='to-script.js')}}"></script>
</body>
</html>
