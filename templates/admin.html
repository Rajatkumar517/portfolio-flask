<h2> User Message</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Data</th>
    </tr>

    {% for row in data %}

    <tr>
        <td>{{row[0]}}</td>
        <td>{{row[1]}}</td>
        <td>{{row[2]}}</td>
        <td>{{row[3]}}</td>
    </tr>

    {%endfor%}
</table>
